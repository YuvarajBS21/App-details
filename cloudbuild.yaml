# cloudbuild.yaml
# This file defines the build steps for deploying multiple Python functions
# to Google Cloud Functions using Google Cloud Build.

steps:
  # Step 1: Install Python dependencies
  - name: 'gcr.io/cloud-builders/pip'
    id: 'Install Dependencies'
    args:
      - 'install'
      - '-r'
      - 'requirements.txt'
      - '--user'

  # Step 2: Deploy the ClassificationFunction
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy ClassificationFunction'
    args:
      - 'functions'
      - 'deploy'
      - 'ClassificationFunction'
      - '--source=.'
      - '--runtime=python39'
      - '--trigger-http'
      - '--entry-point=classification_main' 

  # Step 3: Deploy the OrchestratorFunction
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy OrchestratorFunction'
    args:
      - 'functions'
      - 'deploy'
      - 'OrchestratorFunction'
      - '--source=.'
      - '--runtime=python39'
      - '--trigger-http'
      - '--entry-point=orchestrator_main' 

  # Step 4: Deploy the ResponseFunction
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy ResponseFunction'
    args:
      - 'functions'
      - 'deploy'
      - 'ResponseFunction'
      - '--source=.'
      - '--runtime=python39'
      - '--trigger-http'
      - '--entry-point=response_main' 

  # Step 5: Deploy the SummarizeFunction
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy SummarizeFunction'
    args:
      - 'functions'
      - 'deploy'
      - 'SummarizeFunction'
      - '--source=.'
      - '--runtime=python39'
      - '--trigger-http'
      - '--entry-point=summarize_main' 

# Build timeout
timeout: '1200s'

# 🛠️ FIX FOR SERVICE ACCOUNT LOGGING ERROR
options:
  logging: CLOUD_LOGGING_ONLY

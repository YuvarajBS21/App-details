# cloudbuild.yaml
# This file defines the build steps for deploying multiple Python functions
# to Google Cloud Functions using Google Cloud Build.

steps:
  # Step 1: Install Python dependencies
  # This step installs all the required packages from the requirements.txt file.
  - name: 'gcr.io/cloud-builders/pip'
    id: 'Install Dependencies'
    args:
      - 'install'
      - '-r'
      - 'requirements.txt'
      # Installs packages into the user's home directory within the build environment
      - '--user'

  # Step 2: Deploy the ClassificationFunction
  # This step deploys the function located in the ClassificationFunction directory.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy ClassificationFunction'
    args:
      - 'functions'
      - 'deploy'
      - 'ClassificationFunction'
      - '--source=.'
      - '--runtime=python39'
      - '--trigger-http'
      - '--entry-point=classification_main' # Assumes the entry point is named classification_main in a file inside ClassificationFunction

  # Step 3: Deploy the OrchestratorFunction
  # This step deploys the function located in the OrchestratorFunction directory.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy OrchestratorFunction'
    args:
      - 'functions'
      - 'deploy'
      - 'OrchestratorFunction'
      - '--source=.'
      - '--runtime=python39'
      - '--trigger-http'
      - '--entry-point=orchestrator_main' # Assumes the entry point is named orchestrator_main in a file inside OrchestratorFunction

  # Step 4: Deploy the ResponseFunction
  # This step deploys the function located in the ResponseFunction directory.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy ResponseFunction'
    args:
      - 'functions'
      - 'deploy'
      - 'ResponseFunction'
      - '--source=.'
      - '--runtime=python39'
      - '--trigger-http'
      - '--entry-point=response_main' # Assumes the entry point is named response_main in a file inside ResponseFunction

  # Step 5: Deploy the SummarizeFunction
  # This step deploys the function located in the SummarizeFunction directory.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy SummarizeFunction'
    args:
      - 'functions'
      - 'deploy'
      - 'SummarizeFunction'
      - '--source=.'
      - '--runtime=python39'
      - '--trigger-http'
      - '--entry-point=summarize_main' # Assumes the entry point is named summarize_main in a file inside SummarizeFunction

# Optional: You can specify a timeout for the entire build.
timeout: '1200s'
